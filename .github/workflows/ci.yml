name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  # Lint with the full linter set (staticcheck, errcheck, etc.)
  # declared in .golangci.yml. Runs once for the whole module;
  # the CGO_ENABLED split is handled per-target by govet inside
  # golangci-lint itself, so there's no need for a separate
  # cgo-free lint pass.
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  # Verify the cgo-free sub-packages build and test without cgo.
  # This is the load-bearing guarantee the write/read split
  # exists for: write-only and simple-read consumers must be
  # able to build with CGO_ENABLED=0.
  cgo-free:
    name: cgo-free build (s3parquet + internal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: build
        env:
          CGO_ENABLED: "0"
        run: go build ./s3parquet/... ./internal/...
      - name: test
        env:
          CGO_ENABLED: "0"
        run: go test -short -count=1 ./s3parquet/... ./internal/...
      - name: reject forbidden imports in cgo-free paths
        run: |
          # s3parquet and internal/core must not transitively
          # depend on duckdb-go. A stricter check than just the
          # build tag above, because a future refactor could
          # sneak the dependency in behind `// +build cgo` and
          # still pass the build.
          if go list -deps ./s3parquet/... ./internal/... 2>/dev/null \
              | grep -qE 'duckdb-go|duckdb-go-bindings'; then
            echo "ERROR: duckdb-go dependency leaked into cgo-free paths"
            go list -deps ./s3parquet/... ./internal/... \
              | grep -E 'duckdb-go|duckdb-go-bindings'
            exit 1
          fi

  # Full build + test with cgo (the umbrella package uses
  # DuckDB). Short-mode tests only; integration tests need
  # testcontainers and run in a separate job.
  full:
    name: full build (umbrella, cgo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: build
        run: go build ./...
      - name: test (short)
        run: go test -short -count=1 ./...

  # Integration tests gated on the `integration` build tag. Uses
  # testcontainers to spin up a shared MinIO per `go test`
  # invocation (see internal/testutil). Docker is preinstalled on
  # ubuntu-latest runners. CGO is on because the umbrella and
  # s3sql tests link DuckDB.
  integration:
    name: integration (testcontainers + MinIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: pre-pull MinIO image
        # Keep in sync with internal/testutil/minio.go's minioImage
        run: docker pull pgsty/minio:RELEASE.2026-04-17T00-00-00Z
      - name: test (integration)
        run: go test -tags=integration -count=1 -timeout=15m ./...
